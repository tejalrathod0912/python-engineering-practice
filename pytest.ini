#pytest.ini is a configuration file that tells pytest how to run tests in your project. It defines test discovery rules and behavior.

[pytest]
# Allows tests to import project modules from the repository root.
pythonpath = .

# Shows log messages while tests are running instead of only after failures.
log_cli = true

# Displays debug-level logs from the code and test files.
log_cli_level = DEBUG

# Keeps log output short and readable in the terminal.
log_cli_format = %(levelname)s %(name)s: %(message)s